<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaCalc Pro</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%236366f1%22/></svg>">
    <!-- Math.js for extreme precision and scientific parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <!-- Ambient Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="color-sphere sphere-1"></div>
        <div class="color-sphere sphere-2"></div>
        <div class="color-sphere sphere-3"></div>
        <div class="color-sphere sphere-4"></div>
    </div>

    <!-- Noise Texture Overlay for entire page -->
    <div class="noise-overlay"></div>

    <!-- Theme Switcher -->
    <div class="theme-toggle" id="theme-btn" title="Toggle Theme">
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="sun-icon" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
    </div>

    <div class="app-layout">
        <!-- Calculation History Panel -->
        <aside class="history-panel">
            <div class="glass-grain"></div>
            <div class="history-header">
                <h3>History</h3>
                <button id="clear-history-btn" class="clear-history" title="Clear History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
            <div class="history-list" id="history-list">
                <!-- History items injected here via JS -->
                <div class="history-empty">No calculations yet</div>
            </div>
        </aside>

        <!-- Main Premium Calculator UI -->
        <main class="calculator">
            <div class="glass-grain"></div>
            <div class="watermark"><b>NebulaCalc Pro</b></div>
            
            <!-- Screen -->
            <div class="display">
                <div class="display-history" id="display-history"></div>
                <div class="display-current" id="display-current">0</div>
            </div>

            <!-- Scientific 5-Column Button Grid -->
            <!-- Using Event Delegation, listeners will be attached to this parent -->
            <div class="buttons" id="calculator-buttons">
                <!-- Row 1: Scientific functions & Actions -->
                <button class="btn scientific" data-val="sin(" title="Sine">sin</button>
                <button class="btn scientific" data-val="cos(" title="Cosine">cos</button>
                <button class="btn scientific" data-val="tan(" title="Tangent">tan</button>
                <button class="btn action" data-action="clear" title="Clear All">C</button>
                <button class="btn action" data-action="delete" title="Delete Last">DEL</button>

                <!-- Row 2 -->
                <button class="btn scientific" data-val="^" title="Power">x^y</button>
                <button class="btn scientific" data-val="sqrt(" title="Square Root">√</button>
                <button class="btn scientific" data-val="(">(</button>
                <button class="btn scientific" data-val=")">)</button>
                <button class="btn operator" data-val="/">÷</button>

                <!-- Row 3 -->
                <button class="btn scientific" data-val="pi" title="Pi">π</button>
                <button class="btn number" data-val="7">7</button>
                <button class="btn number" data-val="8">8</button>
                <button class="btn number" data-val="9">9</button>
                <button class="btn operator" data-val="*">×</button>

                <!-- Row 4 -->
                <button class="btn scientific" data-val="%" title="Modulo">mod</button>
                <button class="btn number" data-val="4">4</button>
                <button class="btn number" data-val="5">5</button>
                <button class="btn number" data-val="6">6</button>
                <button class="btn operator" data-val="-">−</button>

                <!-- Row 5 -->
                <button class="btn scientific" data-val="!" title="Factorial">x!</button>
                <button class="btn number" data-val="1">1</button>
                <button class="btn number" data-val="2">2</button>
                <button class="btn number" data-val="3">3</button>
                <button class="btn operator" data-val="+">+</button>

                <!-- Row 6 -->
                <button class="btn empty" disabled></button>
                <button class="btn number" data-val="0">0</button>
                <button class="btn number" data-val=".">.</button>
                <button class="btn equal" data-action="calculate">=</button>
            </div>
        </main>
    </div>

    <!-- Script Engine -->
    <script src="app.js"></script>
</body>
</html>
